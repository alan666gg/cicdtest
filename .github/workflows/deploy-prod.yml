name: Deploy Prod

on:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: deploy-prod-hello-cicd-demo-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish-prod-image:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: prod
    env:
      APP_NAME: hello-cicd-demo
      CONFIGURED_IMAGE_REGISTRY: ghcr.io/${{ github.repository_owner }}
      OVERRIDE_IMAGE_REGISTRY: ${{ vars.IMAGE_REGISTRY }}
      IMAGE_TAG: prod-${{ github.sha }}
      IMAGE_LATEST_TAG: latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve image target
        id: image
        shell: bash
        run: |
          registry="${OVERRIDE_IMAGE_REGISTRY:-$CONFIGURED_IMAGE_REGISTRY}"
          registry="${registry,,}"
          registry="${registry%/}"
          if [[ -z "$registry" ]]; then
            echo "::error::image registry is empty"
            exit 1
          fi
          echo "image_name=${registry}/${APP_NAME}" >> "$GITHUB_OUTPUT"
          echo "registry_host=${registry%%/*}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to registry
        uses: docker/login-action@v3
        with:
          registry: ${{ steps.image.outputs.registry_host }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and push production image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.image.outputs.image_name }}:${{ env.IMAGE_TAG }}
            ${{ steps.image.outputs.image_name }}:${{ env.IMAGE_LATEST_TAG }}
